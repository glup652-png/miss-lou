name: Miss Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

concurrency:
  group: miss-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read

    env:
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      MISS_SYNC_NON_INTERACTIVE: "1"
      MISS_SYNC_WORKERS: "4"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v6

      - name: Podesi Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instaliraj pakete
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Proveri Chrome
        run: google-chrome --version

      - name: Proveri fast skriptu
        run: grep -q "get_all_product_links_from_category_fast" miss_sync_fast.py

      - name: Pokreni Miss Sync Fast
        run: python miss_sync_fast.py

      - name: Proveri broj proizvoda
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          path = Path("wp_products_export.csv")
          if not path.is_file():
              raise SystemExit("CSV nije napravljen.")

          with path.open(newline="", encoding="utf-8") as file:
              count = sum(1 for _ in csv.DictReader(file))

          print(f"Proizvoda u CSV: {count}")
          if count == 0:
              raise SystemExit("Skripta je pronasla 0 proizvoda.")
          PY
