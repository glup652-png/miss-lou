name: Miss Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

concurrency:
  group: miss-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read

    env:
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      MISS_SYNC_NON_INTERACTIVE: "1"
      MISS_SYNC_WORKERS: "4"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Podesi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instaliraj pakete
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Proveri Chrome
        run: google-chrome --version

      - name: Pokreni Miss Sync Fast
        run: python miss_sync_fast.py
